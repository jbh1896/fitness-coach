<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Fitness Coach</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🏋️ AI Fitness Coach</h1>

  <div class="tabs">
    <button class="tab-btn active" data-tab="training">Training</button>
    <button class="tab-btn" data-tab="food">Ernährung</button>
    <button class="tab-btn" data-tab="stats">Stats</button>
  </div>

  <!-- TRAINING -->
  <div id="training" class="tab active">
    <h2>Training Logger</h2>

    <form id="trainingForm">
      <input type="text" id="exercise" placeholder="Übung" required>
      <input type="number" id="weight" placeholder="Gewicht" required>
      <input type="number" id="reps" placeholder="Reps" required>
      <input type="number" id="sets" placeholder="Sets" required>

      <button type="submit">Speichern</button>
    </form>

    <div id="trainingOutput"></div>
  </div>

  <!-- FOOD -->
  <div id="food" class="tab">
    <h2>Ernährung Logger</h2>

    <form id="foodForm">
      <input type="text" id="meal" placeholder="Mahlzeit" required>
      <input type="number" id="protein" placeholder="Protein" required>
      <input type="number" id="calories" placeholder="Kalorien" required>

      <button type="submit">Speichern</button>
    </form>

    <div id="foodOutput"></div>
  </div>

  <!-- STATS -->
  <div id="stats" class="tab">
    <h2>Dashboard</h2>

    <button id="loadStats">Stats Laden</button>

    <div id="statsOutput"></div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
